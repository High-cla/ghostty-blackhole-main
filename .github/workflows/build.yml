name: Build Black Hole

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'Doc/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-glfw

      - name: Build with CMake (static linking)
        run: |
          cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-static -static-libgcc -static-libstdc++"
          cmake --build build

      - name: Verify no DLL dependency
        run: |
          echo "=== Checking DLL dependencies ==="
          objdump -p build/blackhole.exe | grep "DLL Name" || echo "No DLL dependencies found (statically linked)"

      - name: Package for distribution
        run: |
          mkdir -p dist
          cp build/blackhole.exe dist/
          if [ -f build/blackhole.glsl ]; then cp build/blackhole.glsl dist/; fi
          if [ -d build/shaders ]; then cp -r build/shaders dist/; fi
          ls -la dist/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackhole
          path: dist/
          if-no-files-found: error

      - name: Create Release zip
        run: |
          cd dist
          TAG="build-$(date +'%Y%m%d')"
          zip -r "../${TAG}.zip" .
          cd ..

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: blackhole-zip
          path: build-*.zip
          if-no-files-found: error

      - name: Create Git Tag
        run: |
          TAG="build-$(date +'%Y%m%d')"
          git tag -f "$TAG"
          git push origin "$TAG" --force