name: Build Black Hole

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'Doc/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-glfw
            zip

      - name: Build with CMake (static linking)
        shell: msys2 {0}
        run: |
          cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-static -static-libgcc -static-libstdc++"
          cmake --build build

      - name: Package for distribution
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp build/blackhole.exe dist/
          if [ -f build/blackhole.glsl ]; then cp build/blackhole.glsl dist/; fi
          if [ -d build/shaders ]; then cp -r build/shaders dist/; fi
          printf '@echo off\r\n' > dist/start_blackhole.bat
          printf 'start /min "" "%%~dp0blackhole.exe" --render\r\n' >> dist/start_blackhole.bat
          printf 'echo.\r\n' >> dist/start_blackhole.bat
          printf 'echo 按 Ctrl+C 关闭黑洞\r\n' >> dist/start_blackhole.bat
          printf 'pause >nul\r\n' >> dist/start_blackhole.bat
          ls -la dist/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackhole
          path: dist/
          if-no-files-found: error

      - name: Create Release zip
        shell: msys2 {0}
        run: |
          cd dist
          TAG="build-$(date +'%Y%m%d')"
          zip -r "../${TAG}.zip" .
          cd ..

      - name: Create Git Tag
        run: |
          $tag = "build-{0:yyyyMMdd}" -f (Get-Date)
          git tag -f $tag
          git push origin $tag --force